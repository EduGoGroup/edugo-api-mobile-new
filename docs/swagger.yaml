    required:
    - preferences
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.SubmitAttemptRequest:
    properties:
      answers:
        items:
          $ref: '#/definitions/github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.AnswerSubmission'
