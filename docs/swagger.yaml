basePath: /api/v1
definitions:
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.AnswerSubmission:
    properties:
      answer:
        type: string
      question_index:
        type: integer
      time_spent_seconds:
        type: integer
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.ChildProgressResponse:
    properties:
      avg_score:
        type: number
      child_id:
        type: string
      child_name:
        type: string
      completed:
        type: integer
      completion_rate:
        type: number
      total_materials:
        type: integer
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.ChildResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.CreateAssessmentRequest:
    properties:
      available_from:
        type: string
      available_until:
        type: string
      description:
        type: string
      is_timed:
        type: boolean
      material_ids:
        items:
          type: string
        type: array
      max_attempts:
        minimum: 1
        type: number
      pass_threshold:
        maximum: 100
        minimum: 0
        type: number
      show_correct_answers:
        type: boolean
      shuffle_questions:
        type: boolean
      time_limit_minutes:
        minimum: 1
        type: number
      title:
        type: string
    required:
    - title
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.CreateAttemptRequest:
    properties:
      answers:
        items:
          $ref: '#/definitions/github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.AnswerSubmission'
        minItems: 1
        type: array
      idempotency_key:
        type: string
    required:
    - answers
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.CreateMaterialRequest:
    properties:
      academic_unit_id:
        type: string
      description:
        type: string
      grade:
        type: string
      is_public:
        type: boolean
      subject:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.CreateQuestionRequest:
    properties:
      correct_answer:
        type: string
      difficulty:
        enum:
        - easy
        - medium
        - hard
        type: string
      explanation:
        type: string
      options:
        items:
          $ref: '#/definitions/github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.OptionRequest'
        type: array
      points:
        minimum: 1
        type: integer
      question_text:
        type: string
      question_type:
        enum:
        - multiple_choice
        - true_false
        - open
        type: string
      tags:
        items:
          type: string
        type: array
    required:
    - correct_answer
    - difficulty
    - points
    - question_text
    - question_type
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.GuardianRelationRequestDTO:
    properties:
      identifier:
        description: email of the student
        type: string
      relationship_type:
        description: parent, guardian, tutor, other
        type: string
    required:
    - identifier
    - relationship_type
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.GuardianRelationResponse:
    properties:
      created_at:
        type: string
      guardian_id:
        type: string
      guardian_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      is_primary:
        type: boolean
      relationship_type:
        type: string
      status:
        type: string
      student_id:
        type: string
      student_name:
        type: string
      updated_at:
        type: string
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.GuardianStatsResponse:
    properties:
      avg_score:
        type: number
      children_count:
        type: integer
      completion_rate:
        type: number
      total_materials:
        type: integer
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.OptionRequest:
    properties:
      option_id:
        type: string
      option_text:
        type: string
    required:
    - option_text
    type: object
  github_com_EduGoGroup_edugo-api-mobile-new_internal_application_dto.SaveAnswerRequest:
    properties:
      answer:
