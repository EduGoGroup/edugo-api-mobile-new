name: PR to Main - Full Test Suite

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  GO_VERSION: "1.25"
  COVERAGE_THRESHOLD: 33

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Configure private repos
        run: |
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: github.com/EduGoGroup/*

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: make test-unit
        timeout-minutes: 5

      - name: Coverage report
        run: make coverage-report
        timeout-minutes: 5

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report-unit
          path: coverage/
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        if: success()
        with:
          file: coverage/coverage.out
          flags: unittests
          name: codecov-edugo-api-mobile-new
          fail_ci_if_error: false

  lint:
    name: Lint & Format Check
    uses: EduGoGroup/edugo-infrastructure/.github/workflows/reusable-go-lint.yml@main
    with:
      go-version: "1.25"
      args: "--timeout=5m"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: "-no-fail -fmt json -out results.json ./..."
        continue-on-error: true

  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, lint, security-scan]
    if: always()

    steps:
      - name: Generate summary
        uses: actions/github-script@v7
        with:
          script: |
            const unitTests = '${{ needs.unit-tests.result }}';
            const lint = '${{ needs.lint.result }}';
            const security = '${{ needs.security-scan.result }}';

            const allPassed = unitTests === 'success' && lint === 'success' && security === 'success';

            const summary = `## PR to Main - Check Summary

            | Check | Status |
            |-------|--------|
            | Unit Tests | ${unitTests} |
            | Lint & Format | ${lint} |
            | Security Scan | ${security} |

            ${allPassed ? 'All checks passed - PR ready for merge to main' : 'Some checks failed - Please review'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Fail if critical checks failed
        if: needs.unit-tests.result != 'success'
        run: exit 1
